<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Selección de Ayudantes | FCEA Uandes</title>
<style>
  :root{
    --navy:#131E29;
    --navy-2:#243746;
    --red:#CE0019;
    --bg:#F5F6F7;
    --card:#FFFFFF;
    --text:#1C2530;
    --muted:#6B7684;
    --border:#E1E4E8;
    --ok:#1A7F4E;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--bg);
    color:var(--text);
  }
  header{
    background:#fff;
    border-bottom:3px solid var(--red);
    color:var(--navy);
    padding:20px 20px 18px;
    display:flex;
    align-items:center;
    gap:16px;
  }
  header img{height:64px;width:auto;flex-shrink:0;}
  header .header-text{flex:1;}
  header .eyebrow{
    text-transform:uppercase;letter-spacing:.14em;font-size:11px;
    color:var(--red);font-weight:600;margin-bottom:6px;
  }
  header h1{margin:0;font-size:19px;font-weight:700;line-height:1.3;color:var(--navy);}
  header p{margin:6px 0 0;font-size:13px;color:var(--muted);}

.wrap{max-width:720px;margin:0 auto;padding:20px 16px 60px;}

.selector-card{background(--card);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:16px;}
